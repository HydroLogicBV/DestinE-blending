# Local configuration
services:
  nowcast-blend:
    image: nowcast-blend:latest
    build:
      context: .
      dockerfile: Dockerfile
    # Uncomment only to test the Linux/amd64 image on Apple Silicon. It is much slower.
    # platform: linux/amd64
    environment:
      # Writable runtime data root path inside the container.
      - DATA_DIR=/data
      # Local pre-downloaded DGMR model path.
      - DGMR_MODEL_PATH=/model
      # Number of parallel workers.
      - DGMR_MAX_WORKERS=1
      # Secret credentials for data download. Read from the host shell environment (after `source .envrc`).
      - KNMI_API_KEY
      - POLYTOPE_USER_KEY
    volumes:
      # Persist downloads, intermediates, outputs, and logs on the host.
      - ./data:/data
      # Optional local DGMR model cache.
      - ./model:/model:ro
    # Reduced ensemble sizes make the Docker integration run cheaper locally.
    command: ["python", "-m", "nowcast_blend.main", "settings.n_ens_members_dgmr=1", "settings.n_ens_members=2"]
